<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico Financeiro — Método CAF</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#1A3C5E;--azul-m:#2D6A9F;--azul-c:#EBF3FA;
  --am:#E8930A;--am-c:#FEF3DC;
  --vd:#2A7A3B;--vd-c:#EAF5EC;
  --vm:#C0392B;--vm-c:#FDECEA;
  --bg:#F5F7FA;--borda:#DDE2EA;--texto:#1C2333;--sub:#6B7385;
  --r:12px;--sh:0 2px 16px rgba(26,60,94,0.09)
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--texto);min-height:100vh}

/* HEADER */
.header{background:var(--azul);padding:18px 24px 20px;text-align:center}
.header-badge{display:inline-block;background:var(--am);color:#fff;font-weight:700;font-size:12px;padding:3px 10px;border-radius:6px;letter-spacing:.06em;margin-bottom:8px}
.header h1{color:#fff;font-size:20px;font-weight:600;margin-bottom:4px}
.header p{color:rgba(255,255,255,.65);font-size:13px}

/* PROGRESSO */
.prog-wrap{background:#fff;padding:14px 20px;border-bottom:1px solid var(--borda);position:sticky;top:0;z-index:10}
.prog-topo{display:flex;justify-content:space-between;font-size:12px;color:var(--sub);margin-bottom:6px}
.prog-bar{height:5px;background:var(--borda);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--azul-m);border-radius:3px;transition:width .3s}

/* CONTAINER */
.wrap{max-width:680px;margin:0 auto;padding:24px 16px 80px}

/* SEÇÃO */
.secao{background:#fff;border-radius:var(--r);border:1px solid var(--borda);box-shadow:var(--sh);margin-bottom:20px;overflow:hidden}
.secao-header{background:var(--azul);padding:13px 20px;display:flex;align-items:center;gap:10px}
.secao-header h2{color:#fff;font-size:14px;font-weight:600}
.secao-icon{font-size:17px}
.secao-body{padding:20px}

/* CAMPO TEXTO */
.campo{margin-bottom:16px}
.campo:last-child{margin-bottom:0}
.campo label{display:block;font-size:12px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.campo input,.campo select{width:100%;padding:11px 14px;border:1.5px solid var(--borda);border-radius:8px;font-size:14px;color:var(--texto);background:#fff;outline:none;font-family:inherit;transition:border-color .2s}
.campo input:focus,.campo select:focus{border-color:var(--azul-m);box-shadow:0 0 0 3px rgba(45,106,159,.1)}
.campo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* PERGUNTA */
.pergunta{padding:16px 0;border-bottom:1px solid var(--borda)}
.pergunta:last-child{border-bottom:none;padding-bottom:0}
.p-enunciado{font-size:14px;color:var(--texto);margin-bottom:11px;line-height:1.55}
.p-num{display:inline-block;background:var(--azul);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;margin-right:6px;vertical-align:middle}
.opcoes{display:flex;flex-direction:column;gap:7px}
.opcao{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border:1.5px solid var(--borda);border-radius:8px;cursor:pointer;font-size:13.5px;color:var(--texto);background:#fff;text-align:left;font-family:inherit;line-height:1.45;transition:all .15s;width:100%}
.opcao:hover{border-color:var(--azul-m);background:var(--azul-c)}
.opcao.sel-0{border-color:var(--vm);background:var(--vm-c);color:#7a1f1f}
.opcao.sel-1{border-color:var(--am);background:var(--am-c);color:#6b3d00}
.opcao.sel-2{border-color:var(--vd);background:var(--vd-c);color:#1a4d26}
.dot{width:17px;height:17px;border-radius:50%;border:2px solid currentColor;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.opcao.sel-0 .dot::after,.opcao.sel-1 .dot::after,.opcao.sel-2 .dot::after{content:"✓"}

/* BOTÃO */
.btn-wrap{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--borda);padding:14px 20px;z-index:20}
.btn{width:100%;max-width:680px;margin:0 auto;display:block;padding:14px;background:var(--azul);color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s}
.btn:hover{background:#0f2740}
.btn:disabled{background:var(--borda);color:var(--sub);cursor:not-allowed}

/* CONFIRMAÇÃO */
.confirmacao{display:none;text-align:center;padding:48px 24px}
.conf-icon{font-size:56px;margin-bottom:16px}
.conf-titulo{font-size:22px;font-weight:700;color:var(--vd);margin-bottom:8px}
.conf-desc{font-size:14px;color:var(--sub);line-height:1.6;max-width:400px;margin:0 auto}

@media(max-width:480px){.campo-grid{grid-template-columns:1fr}}
</style>

</script>
</head>
<body>
<div class="header">
  <div class="header-badge">MÉTODO CAF</div>
  <h1>Diagnóstico Financeiro</h1>
  <p>Responda as perguntas abaixo — leva cerca de 5 minutos</p>
</div>

<div class="prog-wrap">
  <div class="prog-topo">
    <span id="prog-txt">0 de 15 perguntas respondidas</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="wrap">
  <div id="formulario">

    <!-- DADOS DA EMPRESA -->
    <div class="secao">
      <div class="secao-header"><span class="secao-icon">🏢</span><h2>Dados da empresa</h2></div>
      <div class="secao-body">
        <div class="campo"><label>Nome da empresa *</label><input type="text" id="nome_empresa" placeholder="Ex.: Construções Silva Ltda" oninput="validar()"></div>
        <div class="campo-grid">
          <div class="campo"><label>Responsável</label><input type="text" id="contato" placeholder="Seu nome"></div>
          <div class="campo"><label>WhatsApp / E-mail</label><input type="text" id="contato2" placeholder="Para retorno"></div>
        </div>
        <div class="campo-grid">
          <div class="campo"><label>Setor de atuação</label>
            <select id="setor">
              <option value="Construção civil">Construção civil</option>
              <option value="Instalações e reformas">Instalações e reformas</option>
              <option value="Serviços gerais">Serviços gerais</option>
              <option value="Engenharia">Engenharia</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
          <div class="campo"><label>Faturamento mensal estimado</label>
            <select id="faturamento">
              <option value="">Selecione...</option>
              <option value="Até R$ 10.000">Até R$ 10.000</option>
              <option value="R$ 10.000 a R$ 30.000">R$ 10.000 a R$ 30.000</option>
              <option value="R$ 30.000 a R$ 50.000">R$ 30.000 a R$ 50.000</option>
              <option value="Acima de R$ 50.000">Acima de R$ 50.000</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- BLOCOS DE PERGUNTAS -->
    <div id="blocos"></div>

  </div>

  <!-- CONFIRMAÇÃO -->
  <div class="confirmacao" id="confirmacao">
    <div class="conf-icon">✅</div>
    <div class="conf-titulo">Diagnóstico enviado!</div>
    <div class="conf-desc">Obrigado. A consultora irá analisar suas respostas e em breve entrará em contato com o relatório completo.</div>
  </div>
</div>

<div class="btn-wrap">
  <button class="btn" id="btn-enviar" onclick="enviar()" disabled>Enviar diagnóstico →</button>
</div>

<script>
const PERGUNTAS=[
  {secao:"1. Controle financeiro",icon:"💼",itens:[
    {id:"q1",label:"A empresa possui algum controle de contas a pagar?",opts:["Nenhum controle — pagamentos acontecem quando o fornecedor cobra","Anotações ou lembretes informais (caderno, WhatsApp, memória)","Planilha organizada ou sistema com lançamentos atualizados"]},
    {id:"q2",label:"Existe controle de contas a receber (clientes, parcelas)?",opts:["Não existe controle","Controle informal ou por memória do dono","Registrado e acompanhado regularmente com critério claro"]},
    {id:"q3",label:"A empresa realiza conciliação bancária?",opts:["Não sabe o que é ou nunca fez","Faz às vezes, sem frequência definida","Sim, realizada regularmente (semanal ou mensal)"]}
  ]},
  {secao:"2. Fluxo de caixa",icon:"💰",itens:[
    {id:"q4",label:"Existe fluxo de caixa registrado e atualizado?",opts:["Não existe","Existe mas incompleto ou desatualizado","Sim, atualizado e usado para decisões"]},
    {id:"q5",label:"A empresa consegue fazer previsão financeira para os próximos meses?",opts:["Não — decisões são tomadas no improviso","Parcialmente — apenas algumas receitas previsíveis","Sim — previsto x realizado é acompanhado mensalmente"]},
    {id:"q6",label:"Você sabe responder: o caixa vai ser suficiente nos próximos 30 dias?",opts:["Não consigo responder com segurança","Tenho uma ideia, mas sem base em números reais","Sim, sei com base no fluxo de caixa atualizado"]}
  ]},
  {secao:"3. Estrutura gerencial",icon:"📊",itens:[
    {id:"q7",label:"Existe um plano de contas definido (categorias de receitas, custos e despesas)?",opts:["Não existe","Existe mas sem padronização","Sim, estruturado e seguido por quem faz os lançamentos"]},
    {id:"q8",label:"Os gastos são classificados em fixos e variáveis?",opts:["Não há distinção","O dono sabe de cabeça, mas não está registrado","Sim, classificado no controle com critério definido"]},
    {id:"q9",label:"A empresa separa os custos do serviço das despesas administrativas?",opts:["Não — tudo é gasto, sem distinção","Parcialmente, sem critério claro","Sim, os lançamentos seguem critério definido"]}
  ]},
  {secao:"4. Sistema e processos",icon:"⚙️",itens:[
    {id:"q10",label:"Qual ferramenta é usada para o controle financeiro?",opts:["Nenhuma — ou caderno, WhatsApp, memória","Planilha improvisada ou sistema mal configurado","Sistema financeiro configurado corretamente"]},
    {id:"q11",label:"Existe uma rotina financeira definida (diária, semanal, mensal)?",opts:["Não existe rotina","O responsável faz quando sobra tempo","Sim, rotina documentada e seguida regularmente"]},
    {id:"q12",label:"Quem executa as tarefas financeiras na empresa?",opts:["O próprio dono, sem tempo ou método estruturado","Assistente sem treinamento específico","Responsável treinado com processo e critérios definidos"]}
  ]},
  {secao:"5. Separação PF / PJ e pró-labore",icon:"👤",itens:[
    {id:"q13",label:"As contas bancárias da empresa e do sócio estão separadas?",opts:["Não — tudo misturado em conta pessoal","Há uma conta PJ, mas ainda se usa a pessoal para pagar coisas da empresa","Sim — conta PJ exclusiva para todas as movimentações da empresa"]},
    {id:"q14",label:"As despesas da empresa são pagas e emitidas no CNPJ?",opts:["Não — tudo sai no CPF do sócio","Às vezes — parte no CNPJ, parte no CPF, sem critério","Sim — todas as despesas empresariais são lançadas no CNPJ"]},
    {id:"q15",label:"O sócio retira um pró-labore fixo todo mês?",opts:["Não — retiro dinheiro conforme a necessidade, sem controle","Tenho um valor aproximado, mas não é fixo nem registrado","Sim — pró-labore fixo, registrado e compatível com o caixa da empresa"]}
  ]}
];

const respostas={};
let globalIdx=1;

function renderBlocos(){
  const c=document.getElementById('blocos');
  globalIdx=1;
  PERGUNTAS.forEach((bloco,bi)=>{
    const sec=document.createElement('div');
    sec.className='secao';
    sec.innerHTML=`<div class="secao-header"><span class="secao-icon">${bloco.icon}</span><h2>${bloco.secao}</h2></div><div class="secao-body" id="body-${bi}"></div>`;
    c.appendChild(sec);
    const body=sec.querySelector(`#body-${bi}`);
    bloco.itens.forEach((q,qi)=>{
      const n=globalIdx++;
      const div=document.createElement('div');
      div.className='pergunta';
      div.innerHTML=`<div class="p-enunciado"><span class="p-num">${n}</span>${q.label}</div><div class="opcoes" id="ops-${q.id}"></div>`;
      body.appendChild(div);
      const ops=div.querySelector(`#ops-${q.id}`);
      q.opts.forEach((opt,oi)=>{
        const btn=document.createElement('button');
        btn.className='opcao';
        btn.innerHTML=`<span class="dot"></span><span>${opt}</span>`;
        btn.onclick=()=>selecionar(q.id,oi,btn,ops);
        ops.appendChild(btn);
      });
    });
  });
}

function selecionar(qid,val,btn,row){
  row.querySelectorAll('.opcao').forEach(b=>b.className='opcao');
  btn.className=`opcao sel-${val}`;
  respostas[qid]=val;
  validar();
}

function validar(){
  const nome=document.getElementById('nome_empresa').value.trim();
  const done=Object.keys(respostas).length;
  const total=15;
  const pct=Math.round((done/total)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=`${done} de ${total} perguntas respondidas`;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('btn-enviar').disabled=!(nome&&done===total);
}

async function enviar(){
  const btnEnviar=document.getElementById('btn-enviar');
  btnEnviar.textContent='Enviando...';
  btnEnviar.disabled=true;

  const dados={
    empresa:document.getElementById('nome_empresa').value.trim(),
    contato:document.getElementById('contato').value.trim(),
    contato2:document.getElementById('contato2').value.trim(),
    setor:document.getElementById('setor').value,
    faturamento:document.getElementById('faturamento').value,
    data:new Date().toISOString().split('T')[0],
    respostas
  };
  const json=JSON.stringify(dados);
  const b64=btoa(unescape(encodeURIComponent(json)));
  const urlConsultora='https://clefigur-oss.github.io/metodo-caf/MetodoCAF_Consultora.html?d='+b64;

  // Calcular nível para o e-mail
  const total=Object.values(respostas).reduce((s,v)=>s+v,0);
  const pct=Math.round((total/30)*100);
  const nivel=pct<40?'Nível 0 — Sem estrutura':pct<75?'Nível 1 — Controle parcial':'Nível 2 — Base estruturada';

  // Enviar e-mail via EmailJS
  try{
    emailjs.init('yLd4uGJWt44fJxYMN');
    await emailjs.send('service_3zfjftf','template_lq52f5q',{
      empresa:dados.empresa,
      contato:dados.contato||'Não informado',
      contato2:dados.contato2||'Não informado',
      setor:dados.setor,
      faturamento:dados.faturamento||'Não informado',
      data:dados.data,
      nivel:nivel,
      pontuacao:String(total),
      link_consultora:urlConsultora
    });
  }catch(e){
    console.error('EmailJS erro:',e);
  }

  // Mostrar confirmação
  btnEnviar.textContent='✔ Enviado!';
  document.getElementById('formulario').style.display='none';
  document.getElementById('confirmacao').style.display='block';
  window._linkConsultora=urlConsultora;

  setTimeout(()=>{
    const conf=document.getElementById('confirmacao');
    conf.innerHTML+=`<div style="margin-top:20px;background:#f0f4ff;border:1px solid #c3d0f5;border-radius:10px;padding:16px;text-align:left">
      <div style="font-size:12px;font-weight:700;color:#1A3C5E;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">✅ E-mail enviado para a consultora!</div>
      <div style="font-size:13px;color:#4a5568;margin-bottom:10px">Você também pode copiar e enviar este link pelo WhatsApp:</div>
      <div style="font-size:11px;font-family:monospace;background:#fff;border:1px solid #dde2ea;border-radius:6px;padding:10px;word-break:break-all;color:#333;margin-bottom:10px">${urlConsultora}</div>
      <button onclick="navigator.clipboard.writeText('${urlConsultora}').then(()=>this.textContent='✔ Copiado!').catch(()=>alert('${urlConsultora}'))" style="background:#1A3C5E;color:#fff;border:none;border-radius:7px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Copiar link</button>
    </div>`;
  },200);
}

renderBlocos();
validar();
</script>
</body>
</html>
